name: release

# Build the 10.9-compatible docker CLI on a modern macOS runner and, on v* tags,
# publish it. The build+gate step runs the SAME cmake build + ctest that the Tahoe
# dry run runs locally, so a green local dry run predicts a green CI run. The single
# publish job is the ONLY writer to Releases and needs build-macos, so any gate
# failure means no release (never partial).

on:
  push:
    branches: [main]        # regular build+gate on every main push (artifact, no publish)
    tags: ['v*']            # tags additionally publish a release
  workflow_dispatch:        # manual runs produce an artifact, not a release

permissions:
  contents: write

env:
  # Shared 10.9 build machinery (find_package(MavericksSharedCMake) in the non-iso path).
  # Pinned by SHA for reproducible builds. Bump deliberately to pull shared-machinery changes.
  MSC_REF: ecace6c69ab7cdff3e2feea06155c7efc61ebbf2  # mavericks-shared-cmake

jobs:
  build-macos:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7

      # shared-cmake installs itself via its own action (HTTPS via the runner token). The @<sha> matches
      # MSC_REF above (kept for the SDK cache key); consumed thereafter via find_package.
      - name: Install mavericks-shared-cmake
        uses: schmonz/mavericks-shared-cmake/.github/actions/install@ecace6c69ab7cdff3e2feea06155c7efc61ebbf2  # mavericks-shared-cmake

      - name: Version = VERSION file (tag must match)
        id: ver
        run: |
          VER=$(cat VERSION)
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          if [ "${GITHUB_REF_TYPE}" = tag ] && [ "${GITHUB_REF_NAME}" != "v$VER" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} != v$VER (VERSION file)"; exit 1; fi

      # The 10.9-correct Go toolchain. Stock Go (actions/setup-go) produces a darwin/amd64
      # binary that dyld-faults on 10.9 (osinit_hack -> notify_is_valid_token). schmonz/
      # mavericks-golang's cross .pkg carries the Mavericks patches (osinit_hack version-guard
      # + cgoclang + TLS backport), installs the cross GOROOT to /usr/local/mavericks-go/
      # go126-cross, and cross-compiles darwin/amd64 min-10.9. We put its bin on PATH so the
      # cmake cross build (MVD_GO="go") picks it up. Pinned by tag + sha256; bump deliberately.
      - name: Install patched Go (mavericks-golang cross toolchain)
        env:
          GO_PKG_REF:    v1.26.4-mavericks.2  # schmonz/mavericks-golang release tag
          GO_PKG_SHA256: cd7741b41587d6bec2ee0cbf368f3a75b51aae0e449d671fe6ec8a78717bb11c
        run: |
          ver="${GO_PKG_REF#v}"
          pkg="mavericks-go126-cross-${ver}-darwin-arm64.pkg"
          curl -fL --retry 3 -o "$pkg" \
            "https://github.com/schmonz/mavericks-golang/releases/download/${GO_PKG_REF}/${pkg}"
          echo "${GO_PKG_SHA256}  ${pkg}" | shasum -a 256 -c -
          sudo installer -pkg "$pkg" -target /
          echo "/usr/local/mavericks-go/go126-cross/bin" >> "$GITHUB_PATH"

      - name: Confirm the patched cross toolchain is on PATH
        run: |
          test "$(command -v go)" = /usr/local/mavericks-go/go126-cross/bin/go
          go version

      - name: Cache the MacOSX10.9 SDK
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/.sdk-cache
          key: macosx10.9-sdk-${{ env.MSC_REF }}

      - name: Build + gate (the SAME cmake build the Tahoe dry run runs)
        env:
          MAVERICKS_SDK_CACHE: ${{ github.workspace }}/.sdk-cache
        run: |
          cmake --preset cross
          cmake --build --preset cross
          ctest --preset cross

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: docker-mavericks
          path: build-cross/docker-cli/docker

  # All-or-nothing publish: the ONLY job that writes to Releases, gated on the build.
  publish:
    needs: [build-macos]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: dist/docker
